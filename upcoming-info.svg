<text x="20" y="60" font-family="system-ui, sans-serif" font-size="15" xml:space="preserve" fill="#495057">Reading: Ch. 8 &amp; 9</text>
<text x="20" y="79" font-family="system-ui, sans-serif" font-size="15" xml:space="preserve" fill="#495057">    •is simply dummy text of the printing and typesetting industry.</text>
<text x="20" y="98" font-family="system-ui, sans-serif" font-size="15" xml:space="preserve" fill="#495057">    •Lorem Ipsum has been the industry's standard dummy</text>
<text x="20" y="117" font-family="system-ui, sans-serif" font-size="15" xml:space="preserve" fill="#495057">    •text ever since 1966, when designers at Letraset and James Mosley, the</text>
<text x="20" y="136" font-family="system-ui, sans-serif" font-size="15" xml:space="preserve" fill="#495057">      at St Bride Printing Library in London,</text>
<text x="20" y="155" font-family="system-ui, sans-serif" font-size="15" xml:space="preserve" fill="#495057">    •took a 1914 Cicero translation and scrambled it to make dummy text for</text>
<text x="20" y="174" font-family="system-ui, sans-serif" font-size="15" xml:space="preserve" fill="#495057">      Body Type sheets.</text>
<text x="20" y="193" font-family="system-ui, sans-serif" font-size="15" xml:space="preserve" fill="#495057">•It has survived not only many decades</text>
<text x="20" y="218" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#dc3545">Next Exam: Exam 2 (Testing Center, 90 mins, 11/9-11/10)</text>

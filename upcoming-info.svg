  <text x="20" y="35" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#0d6efd">Lesson 01 (Mon, 8/24) - Class Overview</text>
<text x="20" y="63" font-family="system-ui, sans-serif" font-size="15" fill="#495057">Syllabus very Lorem Ipsum is simply dummy text of the</text>
<text x="20" y="87" font-family="system-ui, sans-serif" font-size="15" fill="#495057">printing and typesetting industry. Lorem Ipsum has been the</text>
<text x="20" y="111" font-family="system-ui, sans-serif" font-size="15" fill="#495057">industry's standard dummy text ever since 1966, when</text>
<text x="20" y="135" font-family="system-ui, sans-serif" font-size="15" fill="#495057">designers at Letraset and James Mosley, the librarian at St</text>
<text x="20" y="159" font-family="system-ui, sans-serif" font-size="15" fill="#495057">Bride Printing Library in London, took a 1914 Cicero</text>
<text x="20" y="183" font-family="system-ui, sans-serif" font-size="15" fill="#495057">translation and scrambled it to make dummy text for</text>
<text x="20" y="207" font-family="system-ui, sans-serif" font-size="15" fill="#495057">Letraset's Body Type sheets. It has survived not only many</text>
<text x="20" y="231" font-family="system-ui, sans-serif" font-size="15" fill="#495057">decades, but also the leap into electronic typesetting,</text>
<text x="20" y="255" font-family="system-ui, sans-serif" font-size="15" fill="#495057">remaining essentially unchanged. It was popularised thanks</text>
<text x="20" y="279" font-family="system-ui, sans-serif" font-size="15" fill="#495057">to these sheets and more recently with desktop publishing</text>
<text x="20" y="303" font-family="system-ui, sans-serif" font-size="15" fill="#495057">software like Aldus PageMaker and Microsoft Word including</text>
<text x="20" y="327" font-family="system-ui, sans-serif" font-size="15" fill="#495057">versions of Lorem Ipsum.</text>
<text x="20" y="355" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#dc3545">Next Exam: Exam 1 (Testing Center, 90 mins, 9/14-9/15)</text>
